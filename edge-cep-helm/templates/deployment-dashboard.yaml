apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-ui
  namespace: {{ .values.namespace }}
  labels:
    {{- include "edgecep.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      app: dashboard-ui
  template:
    metadata:
      labels:
        app: dashboard-ui
        {{- include "edgecep.labels" . | nindent 8 }}
    spec:
      containers:
        - name: dashboard-ui
          image: {{ .Values.dashboard.image }}
          ports:
            - containerPort: 8000
          env:
            - name: MQTT_HOST
              value: {{ .Values.mqttHost | quote }}
            - name: MQTT_PORT
              value: {{ .Values.mqttPort | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}